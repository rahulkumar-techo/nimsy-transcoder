services:
  transcoder:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: nimsy-transcoder
    restart: unless-stopped
    command: pnpm dev
    user: "root"
    environment:
      FFMPEG_HWACCEL: cpu          # Enabled GPU acceleration
      NODE_ENV: development
      CHOKIDAR_USEPOLLING: "true"
      TMPDIR: /tmp/transcoder
    env_file:
      - .env
    ports:
      - "5001:5001"
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      - .:/app
      - /app/node_modules
      - transcoder-tmp:/tmp/transcoder
    deploy:
      resources:
        limits:
          cpus: '4.0'              # Raised to 4.0 to leverage full 11th Gen i3 scaling
          memory: 2000M

volumes:
  transcoder-tmp:
